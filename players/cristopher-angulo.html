<script>
let currentLang = 'en';
const bioEN = `An athletic player characterised by his great versatility on both flanks. He brings a clear offensive vocation and quick adaptation to the top professional category.`;
const bioES = `Jugador atlético caracterizado por su gran polivalencia en ambas bandas. Aporta una marcada vocación ofensiva y capacidad de adaptación rápida a la categoría de privilegio.`;
const posEN = 'Right Back';
const posES = 'Lateral Derecho';
const footEN = 'Right';
const footES = 'Diestro';
function applyLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-en]').forEach(el => { const v = el.getAttribute('data-'+lang); if(v) el.innerHTML = v; });
  document.querySelectorAll('#langToggle,#langToggleMobile').forEach(b => b.textContent = lang==='en'?'ES':'EN');
  document.getElementById('bioText').textContent = lang==='en'?bioEN:bioES;
  document.getElementById('posCell').textContent = lang==='en'?posEN:posES;
  document.getElementById('heroPos').textContent = lang==='en'?posEN:posES;
  document.getElementById('footCell').textContent = lang==='en'?footEN:footES;
}
document.querySelectorAll('#langToggle,#langToggleMobile').forEach(btn => btn.addEventListener('click', ()=>applyLang(currentLang==='en'?'es':'en')));
let lastScroll=0; const navbar=document.getElementById('navbar');
window.addEventListener('scroll',()=>{const c=window.scrollY;if(c>lastScroll&&c>200)navbar.classList.add('hide');else navbar.classList.remove('hide');if(c>80)navbar.classList.add('scrolled');else navbar.classList.remove('scrolled');lastScroll=c;},{passive:true});
const hamburgerBtn=document.getElementById('hamburgerBtn'),drawer=document.getElementById('drawer'),overlay=document.getElementById('drawer-overlay');
function openNav(){drawer.classList.add('open');overlay.classList.add('open');document.body.style.overflow='hidden';}
function closeNav(){drawer.classList.remove('open');overlay.classList.remove('open');document.body.style.overflow='';}
hamburgerBtn.addEventListener('click',openNav);document.getElementById('closeDrawer').addEventListener('click',closeNav);overlay.addEventListener('click',closeNav);
drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click',closeNav));
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:0.08});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
