<style>
  :root {
    --cyan:#20D6FF; --cyan-dim:rgba(32,214,255,0.15); --cyan-glow:rgba(32,214,255,0.4);
    --bg:#0B0B0B; --bg2:#141414; --bg3:#2A2A2A;
    --text:#F5F5F5; --text-muted:#BDBDBD;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;overflow-x:hidden;}
  h1,h2,h3,.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:0.03em;}
  body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;}

  /* NAV */
  #navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:80px;background:rgba(11,11,11,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(32,214,255,0.08);transition:transform 0.35s ease;display:flex;align-items:center;}
  #navbar.hide{transform:translateY(-100%);}
  .nav-inner{max-width:1400px;margin:0 auto;width:100%;padding:0 32px;display:flex;align-items:center;justify-content:space-between;}
  .nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.1em;color:var(--text);text-decoration:none;}
  .nav-logo-text span{color:var(--cyan);}
  .nav-links{display:flex;align-items:center;gap:36px;}
  .nav-links a{color:var(--text-muted);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:0.12em;text-decoration:none;transition:color 0.2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--cyan);}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .lang-btn{background:transparent;border:1px solid var(--bg3);color:var(--text-muted);font-size:12px;font-weight:600;letter-spacing:0.1em;padding:6px 12px;border-radius:4px;cursor:pointer;transition:all 0.2s;font-family:'Manrope',sans-serif;}
  .lang-btn:hover{border-color:var(--cyan);color:var(--cyan);}
  .nav-cta{background:var(--cyan);color:#000;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:10px 22px;border-radius:4px;text-decoration:none;transition:all 0.2s;}
  .nav-cta:hover{background:#fff;}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
  .hamburger span{display:block;width:24px;height:2px;background:var(--text);border-radius:2px;}
  #drawer{position:fixed;top:0;right:-100%;width:280px;height:100vh;background:var(--bg2);z-index:200;border-left:1px solid var(--bg3);transition:right 0.35s ease;display:flex;flex-direction:column;padding:32px 24px;}
  #drawer.open{right:0;}
  #drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:199;display:none;backdrop-filter:blur(4px);}
  #drawer-overlay.open{display:block;}
  .drawer-links{display:flex;flex-direction:column;gap:24px;margin-top:48px;}
  .drawer-links a{color:var(--text);font-size:20px;font-family:'Bebas Neue',sans-serif;letter-spacing:0.1em;text-decoration:none;border-bottom:1px solid var(--bg3);padding-bottom:16px;transition:color 0.2s;}
  .drawer-links a:hover{color:var(--cyan);}

  /* PAGE HERO */
  .page-hero{padding:160px 0 80px;position:relative;overflow:hidden;}
  .page-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
  .page-hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0B0B0B 0%,#141414 100%);}
  .grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(32,214,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(32,214,255,0.03) 1px,transparent 1px);background-size:60px 60px;}
  .page-inner{max-width:1400px;margin:0 auto;padding:0 32px;position:relative;z-index:2;}
  .page-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--cyan);margin-bottom:20px;}
  .page-tag::before{content:'//';opacity:0.5;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,120px);line-height:0.9;letter-spacing:0.02em;}
  .page-title span{color:var(--cyan);}

  /* FILTERS */
  .filters-bar{background:var(--bg2);border-bottom:1px solid var(--bg3);padding:20px 0;position:sticky;top:80px;z-index:50;transition:top 0.35s ease;}
  .filters-inner{max-width:1400px;margin:0 auto;padding:0 32px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .filter-btn{background:transparent;border:1px solid var(--bg3);color:var(--text-muted);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:8px 18px;border-radius:4px;cursor:pointer;transition:all 0.2s;font-family:'Manrope',sans-serif;}
  .filter-btn:hover,.filter-btn.active{background:var(--cyan);border-color:var(--cyan);color:#000;}
  .filter-label{font-size:12px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-right:8px;}

  /* PLAYER GRID */
  .players-section{padding:80px 0 120px;}
  .players-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
  .player-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;overflow:hidden;position:relative;cursor:pointer;transition:all 0.35s ease;aspect-ratio:2/3;display:block;text-decoration:none;color:inherit;}
  .player-card:hover{border-color:var(--cyan);transform:translateY(-6px);box-shadow:0 20px 50px rgba(32,214,255,0.2);}
  .player-card img{width:100%;height:100%;object-fit:cover;filter:grayscale(20%);transition:filter 0.4s;}
  .player-card:hover img{filter:grayscale(0%);}
  .player-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.3) 50%,transparent 100%);}
  .player-card-body{position:absolute;bottom:0;left:0;right:0;padding:20px 16px;}
  .player-card-pos{font-size:10px;color:var(--cyan);font-weight:700;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:6px;}
  .player-card-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.04em;line-height:1;}
  .player-card-club{font-size:12px;color:var(--text-muted);margin-top:6px;}
  .player-card-age{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.7);border:1px solid var(--bg3);border-radius:4px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--text-muted);}
  .player-card-value{position:absolute;top:14px;left:14px;background:rgba(32,214,255,0.15);border:1px solid rgba(32,214,255,0.3);border-radius:4px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--cyan);}
  .player-view-btn{position:absolute;bottom:16px;right:16px;background:var(--cyan);color:#000;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:7px 14px;border-radius:3px;text-decoration:none;opacity:0;transition:opacity 0.2s;}
  .player-card:hover .player-view-btn{opacity:1;}
  .img-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-muted);}
  .img-placeholder i{font-size:40px;color:var(--bg3);}
  .img-placeholder span{font-size:10px;letter-spacing:0.1em;}

  /* WA FLOAT */
  #wa-float{position:fixed;bottom:24px;right:24px;z-index:100;background:#25D366;color:#fff;padding:14px 22px;border-radius:50px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:13px;letter-spacing:0.06em;text-decoration:none;box-shadow:0 8px 32px rgba(37,211,102,0.35);transition:all 0.25s;}
  #wa-float:hover{transform:scale(1.04);}

  /* REVEAL */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.6s ease,transform 0.6s ease;}
  .reveal.visible{opacity:1;transform:translateY(0);}

  @media(max-width:1100px){.players-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:768px){
    .nav-links,.nav-right{display:none;}
    .hamburger{display:flex;}
    .players-grid{grid-template-columns:repeat(2,1fr);}
    .page-inner{padding:0 20px;}
    .filters-inner{padding:0 20px;}
  }
  @media(max-width:480px){.players-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

    <button class="filter-btn active" data-filter="all" data-en="All (19)" data-es="Todos (19)">All (19)</button>

<script>
const players = [
  { name:"Mateo Viera", pos:"Extremo derecho", posKey:"extremo", posEN:"Right Winger", age:21, club:"CD Macará", contract:"2027", value:"€1.00M", slug:"mateo-viera", nation:"Ecuador", img:"../HSM_Photo/Mateo_Viera1.jpg" },
  { name:"Eddy Mejía", pos:"Lateral izquierdo", posKey:"lateral", posEN:"Left Back", age:26, club:"CD Universidad Católica", contract:"—", value:"€900K", slug:"eddy-mejia", nation:"Ecuador", img:"../HSM_Photo/Eddy_Mejia1.jpg" },
  { name:"Aron Rodríguez", pos:"Extremo izquierdo", posKey:"extremo", posEN:"Left Winger", age:26, club:"Independiente del Valle", contract:"—", value:"€800K", slug:"aron-rodriguez", nation:"Ecuador", img:null },
  { name:"Martín Tello", pos:"Pivote", posKey:"mediocentro", posEN:"Pivot", age:21, club:"CD Macará", contract:"2027", value:"€750K", slug:"martin-tello", nation:"Ecuador", img:"../HSM_Photo/Martin_Tello.jpg" },
  { name:"José Luis Marrufo", pos:"Defensa central", posKey:"defensa", posEN:"Centre Back", age:30, club:"CD Macará", contract:"2026", value:"€700K", slug:"jose-marrufo", nation:"Venezuela", img:"../HSM_Photo/Jose_Marrufo.jpg" },
  { name:"José Gabriel Cevallos", pos:"Portero", posKey:"portero", posEN:"Goalkeeper", age:28, club:"Barcelona SC Guayaquil", contract:"2027", value:"€600K", slug:"jose-cevallos", nation:"Ecuador", img:null },
  { name:"Wilter Ayoví", pos:"Extremo derecho", posKey:"extremo", posEN:"Right Winger", age:29, club:"Comerciantes Unidos", contract:"2026", value:"€500K", slug:"wilter-ayovi", nation:"Ecuador", img:null },
  { name:"Andrés Mena", pos:"Pivote", posKey:"mediocentro", posEN:"Pivot", age:25, club:"SD Aucas", contract:"2026", value:"€400K", slug:"andres-mena", nation:"Ecuador", img:"../HSM_Photo/Andres_Mena.jpg" },
  { name:"Rommel Cabezas", pos:"Defensa central", posKey:"defensa", posEN:"Centre Back", age:25, club:"CD El Nacional", contract:"2026", value:"€350K", slug:"rommel-cabezas", nation:"Ecuador", img:null },
  { name:"Freddy Mina", pos:"Extremo derecho", posKey:"extremo", posEN:"Right Winger", age:27, club:"Mushuc Runa SC", contract:"2026", value:"€250K", slug:"freddy-mina", nation:"Ecuador", img:null },
  { name:"Darwin Nazareno", pos:"Lateral derecho", posKey:"lateral", posEN:"Right Back", age:22, club:"CD Universidad Católica", contract:"—", value:"€250K", slug:"darwin-nazareno", nation:"Ecuador", img:"../HSM_Photo/Darwin_Nazareno.jpg" },
  { name:"Piero Guzmán", pos:"Mediocentro ofensivo", posKey:"mediocentro", posEN:"Attacking Mid", age:22, club:"SD Aucas", contract:"2026", value:"€200K", slug:"piero-guzman", nation:"Ecuador", img:"../HSM_Photo/Piero_Guzman.jpg" },
  { name:"Patricio Ramos", pos:"Delantero centro", posKey:"delantero", posEN:"Striker", age:22, club:"CD Macará", contract:"—", value:"€50K", slug:"patricio-ramos", nation:"Ecuador", img:null },
  { name:"Cristopher Angulo", pos:"Lateral derecho", posKey:"lateral", posEN:"Right Back", age:25, club:"Mushuc Runa SC", contract:"2026", value:"€50K", slug:"cristopher-angulo", nation:"Ecuador", img:null },
  { name:"Alessandro Guanoluisa", pos:"Centrocampista", posKey:"mediocentro", posEN:"Midfielder", age:22, club:"Club Tigrillos FC", contract:"—", value:"€50K", slug:"alessandro-guanoluisa", nation:"Ecuador", img:null },
  { name:"Maikel Caicedo", pos:"Defensa central", posKey:"defensa", posEN:"Centre Back", age:21, club:"LDU Quito", contract:"—", value:"€50K", slug:"maikel-caicedo", nation:"Ecuador", img:"../HSM_Photo/Maikel_Caicedo.jpg" },
  { name:"Matías Cabeza", pos:"Delantero centro", posKey:"delantero", posEN:"Striker", age:20, club:"CD Macará", contract:"—", value:"€25K", slug:"matias-cabeza", nation:"Ecuador", img:null },
  { name:"Patrick Ortíz", pos:"Defensa central", posKey:"defensa", posEN:"Centre Back", age:20, club:"LDU Quito", contract:"—", value:"—", slug:"patrick-ortiz", nation:"Ecuador", img:"../HSM_Photo/Patrick_Ortiz.jpg" },
  { name:"Jandry Calle", pos:"Mediocentro ofensivo", posKey:"mediocentro", posEN:"Attacking Mid", age:16, club:"LDU Quito", contract:"—", value:"—", slug:"jandry-calle", nation:"Ecuador", img:"../HSM_Photo/Jandry_Calle.jpg" },
];

let currentLang = 'en';
let currentFilter = 'all';

function renderPlayers(filter) {
  currentFilter = filter;
  const grid = document.getElementById('playersGrid');
  const filtered = filter === 'all' ? players : players.filter(p => p.posKey === filter);
  grid.innerHTML = filtered.map((p, i) => `
    <a href="players/${p.slug}.html" class="player-card reveal" style="transition-delay:${(i%4)*0.07}s">
      ${p.img ? `<img src="${p.img}" alt="${p.name}">` : `<div class="img-placeholder"><i class="fas fa-user"></i><span>${p.name.split(' ')[0].toUpperCase()}</span></div>`}
      <div class="player-card-overlay"></div>
      <span class="player-card-value">${p.value}</span>
      <span class="player-card-age">${p.age}</span>
      <div class="player-card-body">
        <div class="player-card-pos">${currentLang === 'es' ? p.pos : p.posEN}</div>
        <div class="player-card-name">${p.name}</div>
        <div class="player-card-club">${p.club} · ${p.nation}</div>
      </div>
      <span class="player-view-btn">${currentLang === 'es' ? 'Ver Perfil' : 'View Profile'}</span>
    </a>
  `).join('');
  // Re-observe
  document.querySelectorAll('.player-card.reveal').forEach(el => revealObserver.observe(el));
}

const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('visible');revealObserver.unobserve(e.target);} });
}, { threshold:0.05 });

renderPlayers('all');

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPlayers(btn.dataset.filter);
  });
});

function applyLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-en]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if(val) el.innerHTML = val;
  });
  document.querySelectorAll('#langToggle,#langToggleMobile').forEach(b => b.textContent = lang === 'en' ? 'ES' : 'EN');
  renderPlayers(currentFilter);
}
document.querySelectorAll('#langToggle,#langToggleMobile').forEach(btn => {
  btn.addEventListener('click', () => applyLang(currentLang === 'en' ? 'es' : 'en'));
});

let lastScroll = 0;
const navbar = document.getElementById('navbar');
const filtersBar = document.querySelector('.filters-bar');
window.addEventListener('scroll', () => {
  const cur = window.scrollY;
  if(cur > lastScroll && cur > 200) {
    navbar.classList.add('hide');
    filtersBar.style.top = '0';
  } else {
    navbar.classList.remove('hide');
    filtersBar.style.top = '80px';
  }
  lastScroll = cur;
}, {passive:true});

const hamburgerBtn = document.getElementById('hamburgerBtn');
const drawer = document.getElementById('drawer');
const overlay = document.getElementById('drawer-overlay');
hamburgerBtn.addEventListener('click', () => { drawer.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow='hidden'; });
document.getElementById('closeDrawer').addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; });
overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; });
</script>
